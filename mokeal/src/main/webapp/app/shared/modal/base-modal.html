<div class="mokeal-modal-wrapper">
  <!-- Header -->
  <div class="modal-header-mk">
    <div class="modal-header-left">
      <div class="modal-icon">{{ icon }}</div>
      <div>
        <div class="modal-title-mk">{{ modalTitle }}</div>
        @if (subtitle) {
          <div class="modal-subtitle">{{ subtitle }}</div>
        }
      </div>
    </div>
    <button class="modal-close-btn" (click)="cancel()" aria-label="Cerrar">✕</button>
  </div>

  <!-- Contenido dinámico -->
  <div class="modal-body-mk">
    <ng-template #contentHost></ng-template>
  </div>

  <!-- Footer -->
  <div class="modal-footer-mk">
    <div class="footer-left">
      @if (showDelete && mode === 'edit') {
        @if (!confirmDelete) {
          <button class="btn-mk btn-mk-danger" (click)="confirmAndDelete()" [disabled]="isDeleting">🗑 Eliminar</button>
        } @else {
          <button class="btn-mk btn-mk-danger-confirm" (click)="confirmAndDelete()" [disabled]="isDeleting">
            {{ isDeleting ? 'Eliminando...' : '⚠ Confirmar eliminación' }}
          </button>
        }
      }
    </div>
    <div class="footer-right">
      <button class="btn-mk btn-mk-secondary" (click)="cancel()" [disabled]="isSaving">Cancelar</button>
      @if (mode !== 'view') {
        <button class="btn-mk btn-mk-primary" (click)="save()" [disabled]="isSaving">
          {{ saveLabel }}
        </button>
      }
    </div>
  </div>
</div>
